services:
  agent:
    build: .
    container_name: bna-agent
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./media:/app/media
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/app/data/agent.db').execute('SELECT 1')"]
      interval: 60s
      timeout: 10s
      retries: 3
