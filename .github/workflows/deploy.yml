name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:        # manual "Run workflow" button in the Actions tab

# Avoid two deploys racing.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production    # optional but recommended; lets you require manual approval

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=yes \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              DOPPLER_TOKEN="${DOPPLER_TOKEN}" bash -s <<'REMOTE_SCRIPT'
          set -euo pipefail
          cd /opt/breaking-news-agent
          echo "[deploy] git pull"
          git pull --ff-only
          echo "[deploy] secrets sync from Doppler"
          bash scripts/secrets-fetch.sh doppler
          echo "[deploy] rebuild and restart"
          docker compose up -d --build
          echo "[deploy] container status"
          docker compose ps
          REMOTE_SCRIPT

      - name: Health check
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            sleep 5
            if docker compose -f /opt/breaking-news-agent/docker-compose.yml ps --format json | grep -q "\"State\":\"running\""; then
              echo "[health] container is running"
              exit 0
            else
              echo "[health] container not running; deployment failed"
              docker compose -f /opt/breaking-news-agent/docker-compose.yml logs --tail=50
              exit 1
            fi
          '
